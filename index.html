<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>${DATA.title}</title>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
  };
</script>
<style>
:root{ --bg:#0b1220; --panel:#111a2e; --text:#e5e7eb; --muted:#aab3c5; --primary:#6366f1; --primary2:#22c55e; --border:rgba(255,255,255,0.1); --radius:16px; }
body{ margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; justify-content:center; padding:20px; box-sizing:border-box; }
.card{ background:var(--panel); width:100%; max-width:600px; border-radius:var(--radius); padding:24px; box-shadow:0 10px 30px rgba(0,0,0,0.3); border:1px solid var(--border); }
h1{ margin:0 0 10px; font-size:22px; } .desc{ color:var(--muted); font-size:13px; margin-bottom:20px; }
label{ font-size:10px; text-transform:uppercase; font-weight:bold; color:var(--muted); margin-bottom:4px; display:block; }
input{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:var(--text); margin-bottom:15px; box-sizing:border-box; outline:none; }
.btn{ background:var(--primary); color:#fff; border:none; padding:12px 20px; border-radius:10px; cursor:pointer; font-weight:700; width:100%; transition:0.2s; }
.btn:hover{ filter:brightness(1.1); }
.opt{ display:block; padding:14px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; cursor:pointer; transition:0.2s; }
.opt:hover{ background:rgba(255,255,255,0.05); } .opt.active{ border-color:var(--primary); background:rgba(99,102,241,0.1); }
.bar{ height:6px; background:rgba(255,255,255,0.05); border-radius:3px; margin-bottom:20px; overflow:hidden; }
.fill{ height:100%; background:var(--primary); transition:width 0.3s; }
table{ width:100%; border-collapse:collapse; margin-top:15px; font-size:12px; }
th, td{ text-align:left; padding:8px; border-bottom:1px solid var(--border); }
${dir==='rtl'?'th, td{text-align:right;}':''}
</style>
</head>
<body>
<div class="card" id="app"></div>
<script>
const DATA = {"title":"Interactive Quiz","desc":"","lang":"en","randQ":false,"randA":false,"saveData":false,"classLbl":"Kelas","sheetUrl":"","questions":[{"q":"According to the source material, what distinguishes 'Big Data' from standard datasets?","choices":["The data is exclusively stored in a single, high-capacity centralized server.","The quantities of information exceed the processing capacity of traditional computing systems.","The data consists only of structured information like Excel spreadsheets.","The data is generated at a fixed, slow speed to ensure accuracy."],"answerIndex":1,"explain":""},{"q":"Which of the following describes the concept of 'Variety' in big data?","choices":["The high frequency at which new data is generated every minute.","The inclusion of different data types such as log files, x-ray images, and patient records.","The total volume of data measured in units like exabytes.","The process of cleaning data to ensure it is trustworthy for analysis."],"answerIndex":1,"explain":""},{"q":"In the context of the healthcare industry example, what would be considered the 'Value' of big data?","choices":["The accumulation of $2,314$ exabytes of data annually.","The high speed at which patient records are generated across hospitals.","The ability to detect diseases faster and reduce the cost of treatments.","The use of Hadoop to store patient x-ray images in a distributed manner."],"answerIndex":2,"explain":""},{"q":"How does the Hadoop Distributed File System (HDFS) ensure that data is safe even if a single machine fails?","choices":["It stores all data on a single, indestructible hardware node.","It breaks files into smaller chunks and makes copies of them across different nodes.","It uses the MapReduce technique to encrypt the data into unreadable fragments.","It converts all unstructured data into structured Excel files for safer storage."],"answerIndex":1,"explain":""},{"q":"The 'MapReduce' technique is primarily associated with which aspect of big data management?","choices":["Storing massive volumes of data in a centralized database.","Ensuring the veracity and trustworthiness of data sources.","Processing large tasks in a parallel fashion by breaking them into smaller tasks.","Visualizing data for end-users in video games like Halo 3."],"answerIndex":2,"explain":""},{"q":"According to the video transcript, how did big data assist during Hurricane Sandy in 2012?","choices":["It was used to physically stop the hurricane from reaching the East Coast.","It predicted the landfall of the hurricane five days in advance.","It automatically sent emails to all 188 million internet users in the area.","It reduced the volume of data generated by smartphones during the disaster."],"answerIndex":1,"explain":""},{"q":"In the gaming industry, why do designers analyze data to see where players 'pause, restart, or quit'?","choices":["To increase the difficulty of the game so fewer people can finish it.","To understand where to rework the story and reduce the customer churn rate.","To ensure that the game generates more than $40$ exabytes of data per user.","To switch the game from a distributed framework to a traditional computing system."],"answerIndex":1,"explain":""},{"q":"True or False: Veracity refers to the massive scale of data generated by 5 billion smartphone users.","choices":["True","False"],"answerIndex":1,"explain":""},{"q":"Based on the Simplilearn transcript, approximately how much data is generated every month by a single smartphone user?","choices":["$3.8$ million megabytes.","$40$ exabytes.","$2,314$ exabytes.","$188$ million exabytes."],"answerIndex":1,"explain":""},{"q":"Which of the following frameworks was NOT explicitly mentioned as a tool to store or process big data?","choices":["Cassandra","Spark","Hadoop","Oracle"],"answerIndex":3,"explain":""}]}; 
const UI = {"name":"Full Name","class":"Kelas","start":"Start Quiz","next":"Next","finish":"Finish","retake":"Retake","rank":"Top 10 Ranking","saving":"Saving data..."};
let state = { mode:'login', idx:0, ans:[], name:'', class:'', qs:[], loading:false, ranking:[] };

function render(){
  const app = document.getElementById('app');
  if(state.mode==='login'){
    app.innerHTML = '<h1>' + DATA.title + '</h1><p class="desc">' + DATA.desc + '</p>' +
      '<label>' + UI.name + '</label><input type="text" id="u_name" value="' + state.name + '">' +
      '<label>' + UI.class + '</label><input type="text" id="u_class" value="' + state.class + '">' +
      '<button class="btn" onclick="start()">' + UI.start + '</button>';
  } else if(state.mode==='quiz'){
    const q = state.qs[state.idx];
    app.innerHTML = '<div class="bar"><div class="fill" style="width:' + ((state.idx)/state.qs.length)*100 + '%"></div></div>' +
      '<div style="font-size:11px; color:var(--muted); margin-bottom:10px;">Q ' + (state.idx+1) + ' / ' + state.qs.length + '</div>' +
      '<h2 style="font-size:17px; margin-bottom:20px;">' + q.q + '</h2>' +
      q.choices.map((c,i) => '<div class="opt ' + (state.ans[state.idx]===i?'active':'') + '" onclick="setAns(' + i + ')">' + c + '</div>').join('') +
      '<button class="btn" style="margin-top:10px;" onclick="next()">' + (state.idx===state.qs.length-1?UI.finish:UI.next) + '</button>';
  } else if(state.mode==='result'){
    let score = state.ans.reduce((acc, a, i) => acc + (a === state.qs[i].answerIndex ? 1 : 0), 0);
    let pct = Math.round((score/state.qs.length)*100);
    let html = '<h1>Result</h1><div style="font-size:48px; font-weight:900; color:var(--primary2);">' + pct + '% (' + score + '/' + state.qs.length + ')</div>';
    if(DATA.saveData){
      html += '<div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;"><h3>' + UI.rank + '</h3>';
      if(state.loading) html += '<p>' + UI.saving + '</p>';
      else if(state.ranking.length > 0) {
        html += '<table><tr><th>#</th><th>Name</th><th>' + UI.class + '</th><th>%</th></tr>' + 
          state.ranking.map((r,i) => '<tr><td>' + (i+1) + '</td><td>' + r.name + '</td><td>' + r.class + '</td><td>' + r.percent + '</td></tr>').join('') + '</table>';
      }
      html += '</div>';
    }
    html += '<button class="btn" style="margin-top:20px;" onclick="location.reload()">' + UI.retake + '</button>';
    app.innerHTML = html;
  }
  if (window.MathJax && window.MathJax.typeset) window.MathJax.typeset();
}
function start(){
  state.name = document.getElementById('u_name').value.trim(); 
  state.class = document.getElementById('u_class').value.trim();
  if(!state.name || !state.class) return alert('Sila isi maklumat!');
  state.qs = JSON.parse(JSON.stringify(DATA.questions));
  if(DATA.randQ) state.qs.sort(() => Math.random()-0.5);
  if(DATA.randA) state.qs.forEach(q => {
    let orig = q.choices[q.answerIndex];
    q.choices.sort(() => Math.random()-0.5);
    q.answerIndex = q.choices.indexOf(orig);
  });
  state.ans = new Array(state.qs.length).fill(null);
  state.mode = 'quiz'; render();
}
function setAns(i){ state.ans[state.idx] = i; render(); }
function next(){
  if(state.ans[state.idx]===null) return alert('Sila pilih jawapan!');
  if(state.idx < state.qs.length - 1){ state.idx++; render(); }
  else { finish(); }
}
async function finish(){
  state.mode = 'result'; render();
  if(DATA.saveData && DATA.sheetUrl){
    state.loading = true; render();
    let score = state.ans.reduce((acc, a, i) => acc + (a === state.qs[i].answerIndex ? 1 : 0), 0);
    let pct = Math.round((score/state.qs.length)*100);
    try {
      await fetch(DATA.sheetUrl, { method:'POST', body: JSON.stringify({name:state.name, class:state.class, score:score, percent:pct}), mode:'no-cors' });
      setTimeout(async () => {
        try { const res = await fetch(DATA.sheetUrl); state.ranking = await res.json(); render(); } catch(e){}
        state.loading = false; render();
      }, 1500);
    } catch(e){ state.loading = false; render(); }
  }
}
render();
</script>
</body></html>
